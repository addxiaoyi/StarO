name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  NODE_VERSION: '20'
  # 目标服务器
  TARGET_HOST: '186.241.74.3'
  TARGET_USER: 'root'
  TARGET_PORT: 22
  # 跳板机
  JUMP_HOST: '103.40.14.25'
  JUMP_USER: 'add'
  JUMP_PORT: 19198
  # 应用配置
  APP_DIR: '/www/wwwroot/auth.star-web.top'
  APP_PORT: 3002

jobs:
  # =============================================
  # Job 1: 代码检查和测试
  # =============================================
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck || true

      - name: ESLint
        run: npm run lint || true

  # =============================================
  # Job 2: 构建
  # =============================================
  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify build artifacts
        run: |
          echo "=== 验证构建产物 ==="
          if [ ! -d ".next/server" ]; then
            echo "ERROR: 缺少 server 目录"
            exit 1
          fi
          if [ ! -d ".next/static" ]; then
            echo "ERROR: 缺少 static 目录"
            exit 1
          fi
          SERVER_FILES=$(find .next/server -type f | wc -l)
          STATIC_FILES=$(find .next/static -type f | wc -l)
          echo "Server 文件: $SERVER_FILES"
          echo "Static 文件: $STATIC_FILES"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            .next/server
            .next/static
            package.json
            package-lock.json
            .next/standalone
          retention-days: 1

  # =============================================
  # Job 3: 部署 (仅在 main/master 分支推送时)
  # =============================================
  deploy:
    name: Deploy via Jump Server
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: production
      url: https://auth.star-web.top
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup SSH Config
        run: |
          mkdir -p ~/.ssh

          # 写入 SSH Config 配置跳板机
          cat >> ~/.ssh/config << 'SSHCONF'
          # 跳板机配置
          Host jump
              HostName ${{ env.JUMP_HOST }}
              User ${{ env.JUMP_USER }}
              Port ${{ env.JUMP_PORT }}
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null

          # 目标服务器（通过跳板机）
          Host target
              HostName ${{ env.TARGET_HOST }}
              User ${{ env.TARGET_USER }}
              Port ${{ env.TARGET_PORT }}
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
              ProxyJump jump
          SSHCONF

          chmod 600 ~/.ssh/config
          echo "SSH Config 已配置"

      - name: Add known hosts
        run: |
          ssh-keyscan -H ${{ env.JUMP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh-keyscan -H ${{ env.TARGET_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Package build
        run: |
          tar -czf build.tar.gz -C build .

      - name: Upload to Jump Server
        run: |
          scp -o ConnectTimeout=30 build.tar.gz target:/tmp/starx-build.tar.gz

      - name: Deploy on Target Server
        run: |
          ssh target << 'DEPLOY_EOF'
            set -e

            APP_DIR="${{ env.APP_DIR }}"
            BACKUP_DIR="${APP_DIR}.backup.$(date +%Y%m%d_%H%M%S)"

            echo "============================================="
            echo "  StarX-Oauth 部署开始"
            echo "  时间: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "============================================="

            # 创建应用目录
            if [ ! -d "$APP_DIR" ]; then
              echo "[INFO] 创建应用目录: $APP_DIR"
              mkdir -p "$APP_DIR"
            fi

            # 停止服务
            echo "[INFO] 停止服务..."
            systemctl stop starx-oauth 2>/dev/null || pm2 stop starx-oauth 2>/dev/null || true

            # 备份当前构建
            if [ -d "$APP_DIR/.next" ]; then
              echo "[INFO] 备份当前构建到: $BACKUP_DIR"
              cp -r "$APP_DIR/.next" "$BACKUP_DIR"
            fi

            # 备份 package.json
            if [ -f "$APP_DIR/package.json" ]; then
              cp "$APP_DIR/package.json" "$BACKUP_DIR/" 2>/dev/null || true
            fi

            # 解压新构建
            echo "[INFO] 解压构建文件..."
            cd "$APP_DIR"
            rm -rf .next build package.json package-lock.json 2>/dev/null || true
            mkdir -p .next
            tar -xzf /tmp/starx-build.tar.gz -C .
            cp build/package.json . 2>/dev/null || true
            cp build/package-lock.json . 2>/dev/null || true

            # 安装依赖
            echo "[INFO] 安装依赖..."
            npm ci --production 2>/dev/null || npm install --production

            # 设置权限
            echo "[INFO] 设置权限..."
            chown -R www-data:www-data "$APP_DIR" 2>/dev/null || true
            chmod -R 755 "$APP_DIR" 2>/dev/null || true

            # 启动服务 (使用 PM2)
            echo "[INFO] 启动服务..."

            # 检查是否有 PM2
            if ! command -v pm2 &> /dev/null; then
              echo "[INFO] 安装 PM2..."
              npm install -g pm2
            fi

            # 停止并删除旧进程
            pm2 stop starx-oauth 2>/dev/null || true
            pm2 delete starx-oauth 2>/dev/null || true

            # 启动新服务
            pm2 start npm --name "starx-oauth" -- start

            # 保存 PM2 配置
            pm2 save

            # 设置开机自启
            pm2 startup 2>/dev/null || true

            # 等待服务启动
            sleep 5

            # 检查服务状态
            echo "[INFO] 检查服务状态..."
            pm2 status

            # 健康检查
            echo "[INFO] 执行健康检查..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${{ env.APP_PORT }}/api/health || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ HTTP 健康检查通过 (状态码: $HTTP_CODE)"
            else
              echo "✗ HTTP 健康检查失败 (状态码: $HTTP_CODE)"
              echo "[WARN] 尝试查看日志..."
              pm2 logs starx-oauth --lines 20 --nostream
            fi

            # 清理临时文件
            echo "[INFO] 清理临时文件..."
            rm -f /tmp/starx-build.tar.gz
            rm -rf "$BACKUP_DIR"

            echo ""
            echo "============================================="
            echo "  部署完成! 🎉"
            echo "  时间: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "============================================="
            echo ""
            echo "访问地址: https://auth.star-web.top"
            echo "管理员: admin@localhost / admin"
          DEPLOY_EOF

      - name: Cleanup local artifacts
        run: rm -f build.tar.gz

  # =============================================
  # Job 4: 通知部署结果
  # =============================================
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ 部署成功！"
            echo "访问地址: https://auth.star-web.top"
            echo "默认管理员: admin@localhost / admin"
          else
            echo "❌ 部署失败，请检查日志"
          fi
