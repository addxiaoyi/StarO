name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  NODE_VERSION: '20'
  APP_DIR: '/www/wwwroot/auth.star-web.top'
  REMOTE_HOST: '186.241.74.3'
  REMOTE_USER: 'root'

jobs:
  # =============================================
  # Job 1: 代码检查和测试
  # =============================================
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck || true

      - name: ESLint
        run: npm run lint || true

  # =============================================
  # Job 2: 构建
  # =============================================
  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Verify build artifacts
        run: |
          echo "=== 验证构建产物 ==="
          if [ ! -d ".next/server" ]; then
            echo "ERROR: 缺少 server 目录"
            exit 1
          fi
          if [ ! -d ".next/static" ]; then
            echo "ERROR: 缺少 static 目录"
            exit 1
          fi
          SERVER_FILES=$(find .next/server -type f | wc -l)
          STATIC_FILES=$(find .next/static -type f | wc -l)
          echo "Server 文件: $SERVER_FILES"
          echo "Static 文件: $STATIC_FILES"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            .next/server
            .next/static
          retention-days: 1

  # =============================================
  # Job 3: 部署 (仅在 main/master 分支推送时)
  # =============================================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: production
      url: https://auth.star-web.top
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .next

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.REMOTE_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Package build
        run: tar -czf build.tar.gz -C .next server static

      - name: Upload to server
        run: |
          scp -o ConnectTimeout=30 build.tar.gz ${{ env.REMOTE_USER }}@${{ env.REMOTE_HOST }}:/tmp/

      - name: Deploy on server
        run: |
          ssh ${{ env.REMOTE_USER }}@${{ env.REMOTE_HOST }} << 'EOF'
            set -e

            APP_DIR="${{ env.APP_DIR }}"
            BACKUP_DIR="${APP_DIR}.backup.$(date +%Y%m%d_%H%M%S)"

            echo "=== 停止服务 ==="
            systemctl stop starx-oauth 2>/dev/null || true

            echo "=== 备份当前构建 ==="
            if [ -d "$APP_DIR/.next" ]; then
              cp -r "$APP_DIR/.next" "$BACKUP_DIR"
              echo "备份保存到: $BACKUP_DIR"
            fi

            echo "=== 解压新构建 ==="
            cd "$APP_DIR"
            rm -rf .next
            mkdir -p .next
            cd .next
            tar -xzf /tmp/build.tar.gz

            echo "=== 设置权限 ==="
            chown -R www-data:www-data "$APP_DIR/.next/server"
            chown -R www-data:www-data "$APP_DIR/.next/static"

            echo "=== 启动服务 ==="
            systemctl start starx-oauth
            sleep 3

            echo "=== 服务状态 ==="
            systemctl status starx-oauth --no-pager | head -10

            echo "=== 健康检查 ==="
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3002/ || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ HTTP 健康检查通过 (状态码: $HTTP_CODE)"
            else
              echo "✗ HTTP 健康检查失败 (状态码: $HTTP_CODE)"
              exit 1
            fi

            echo "=== 清理 ==="
            rm -f /tmp/build.tar.gz
            rm -rf "$BACKUP_DIR"

            echo ""
            echo "============================================="
            echo "  部署完成!"
            echo "============================================="
          EOF

      - name: Cleanup local artifacts
        run: rm -f build.tar.gz

  # =============================================
  # Job 4: E2E 测试 (可选，需配置 Playwright)
  # =============================================
  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: false  # 设为 true 启用 E2E 测试
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          BASE_URL: 'https://auth.star-web.top'